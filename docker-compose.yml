version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: shareflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shareflow
      POSTGRES_USER: shareflow
      POSTGRES_PASSWORD: shareflow_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shareflow_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://shareflow:shareflow_pass@db:5432/shareflow
      FLASK_ENV: development
    ports:
      - "5050:5050"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: >
      sh -c "flask db upgrade && python run.py"

volumes:
  pgdata:
  uploads_data:
